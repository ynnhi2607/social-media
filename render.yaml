services:
  # Backend API Server
  - type: web
    name: social-media-backend
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    envVars:
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: social-media-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    healthCheckPath: /health

  # Frontend Client
  - type: web
    name: social-media-frontend
    runtime: docker
    dockerfilePath: ./client/Dockerfile
    dockerContext: ./client
    envVars:
      - key: VITE_API_URL
        sync: false

# PostgreSQL Database
databases:
  - name: social-media-db
    databaseName: social_media
    user: social_media_user
